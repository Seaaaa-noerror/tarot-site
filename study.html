<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习塔罗干货</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="usage-modal" class="usage-modal hidden" aria-hidden="true">
        <div class="usage-modal-backdrop" data-close-usage="true"></div>
        <div class="usage-modal-card" role="dialog" aria-modal="true" aria-labelledby="usage-modal-title">
            <p class="eyebrow">How To Use</p>
            <h2 id="usage-modal-title">学习页使用说明</h2>
            <div class="usage-modal-body">
                <p>1. 上半部分是你可以自行补充的学习干货。</p>
                <p>2. 下方 78 张牌按分类收起，点击分类前的小三角展开。</p>
                <p>3. 点击牌名会跳转到单张牌学习页。</p>
                <p>4. 在详情页里可以查看牌面说明，并保存自己的学习记录。</p>
            </div>
            <div class="usage-modal-actions">
                <button id="usage-modal-close" class="draw-btn" type="button">开始学习</button>
            </div>
        </div>
    </div>

    <div class="subpage-shell">
        <header class="subpage-hero">
            <div>
                <p class="eyebrow">Study Notes</p>
                <h1>学习塔罗干货</h1>
                <p class="hero-copy">把基础知识、个人笔记和 78 张牌的学习入口整合在同一页里，形成你自己的塔罗学习台。</p>
            </div>
            <nav class="subpage-nav">
                <a class="text-btn nav-light-btn" href="index.html">返回抽牌首页</a>
                <a class="text-btn nav-light-btn" href="journal.html">去日记页</a>
                <a class="text-btn nav-light-btn" href="language.html">去语言素材库</a>
            </nav>
        </header>

        <section class="panel workspace-panel">
            <div class="section-head">
                <div>
                    <p class="eyebrow">Quick Notes</p>
                    <h2>学习塔罗干货</h2>
                </div>
                <button id="toggle-study-add" class="secondary-btn section-btn" type="button">添加内容</button>
            </div>

            <form id="study-note-form" class="stack-form compact-form hidden">
                <label class="field">
                    <span>标题</span>
                    <input id="study-note-title" type="text" placeholder="例如：如何理解宫廷牌">
                </label>
                <label class="field">
                    <span>内容</span>
                    <textarea id="study-note-content" rows="4" placeholder="补充你自己的学习经验、记忆方法、牌义观察。"></textarea>
                </label>
                <button class="secondary-btn" type="submit">保存学习内容</button>
            </form>

            <div id="learning-notes" class="knowledge-grid"></div>
        </section>

        <section class="panel workspace-panel">
            <div class="section-head">
                <div>
                    <p class="eyebrow">78 Cards</p>
                    <h2>塔罗牌 78 张分类学习</h2>
                </div>
                <p class="section-meta">点击小三角展开分类，点击牌名进入详情页</p>
            </div>

            <div class="accordion-deck">
                <section class="accordion-group">
                    <div class="accordion-header">
                        <button class="accordion-toggle" type="button" data-target="major-list" aria-expanded="false">▸</button>
                        <h3>大阿尔克纳</h3>
                    </div>
                    <div id="major-list" class="study-card-grid hidden"></div>
                </section>
                <section class="accordion-group">
                    <div class="accordion-header">
                        <button class="accordion-toggle" type="button" data-target="wands-list" aria-expanded="false">▸</button>
                        <h3>权杖</h3>
                    </div>
                    <div id="wands-list" class="study-card-grid hidden"></div>
                </section>
                <section class="accordion-group">
                    <div class="accordion-header">
                        <button class="accordion-toggle" type="button" data-target="cups-list" aria-expanded="false">▸</button>
                        <h3>圣杯</h3>
                    </div>
                    <div id="cups-list" class="study-card-grid hidden"></div>
                </section>
                <section class="accordion-group">
                    <div class="accordion-header">
                        <button class="accordion-toggle" type="button" data-target="swords-list" aria-expanded="false">▸</button>
                        <h3>宝剑</h3>
                    </div>
                    <div id="swords-list" class="study-card-grid hidden"></div>
                </section>
                <section class="accordion-group">
                    <div class="accordion-header">
                        <button class="accordion-toggle" type="button" data-target="pentacles-list" aria-expanded="false">▸</button>
                        <h3>星币</h3>
                    </div>
                    <div id="pentacles-list" class="study-card-grid hidden"></div>
                </section>
            </div>
        </section>
    </div>

    <script src="workspace.js"></script>
</body>
</html>
